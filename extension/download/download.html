<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TrialGuard — Aion 1.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      width: 360px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header span { font-size: 22px; }
    h1 { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .sub { font-size: 11px; color: #64748b; }
    .status {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-wrap {
      width: 100%;
      background: #0f172a;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 12px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #3b82f6;
      border-radius: 999px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-bar.indeterminate {
      width: 35%;
      animation: slide 1s ease-in-out infinite;
    }
    @keyframes slide { 0% { margin-left:-35%; } 100% { margin-left:100%; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      flex-shrink: 0;
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #1e3a5f; color: #475569; cursor: default; }
    .ready { color: #34d399; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <span>🛡️</span>
    <div><h1>TrialGuard — Aion 1.0</h1><div class="sub">On-device AI model setup</div></div>
  </div>
  <div class="status" id="status">Checking…</div>
  <div class="progress-wrap" id="pw"><div class="progress-bar indeterminate" id="pb"></div></div>
  <button id="btn" disabled>Checking…</button>
  <script src="download.js"></script>
</body>
</html>
