<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrialGuard — Cancel Trial</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="header">
    <span class="logo">🛡</span>
    <div class="header-text">
      <div class="title" id="sp-title">TrialGuard</div>
      <div class="subtitle" id="sp-subtitle">Automated Cancellation</div>
    </div>
  </div>

  <div id="sp-log" class="log" role="log" aria-live="polite"></div>

  <div id="sp-mcp-setup" class="mcp-setup hidden">
    <p class="mcp-heading">Playwright MCP Server is not running.</p>
    <p class="mcp-label">Start it with:</p>
    <div class="code-block" id="mcp-cmd">npx @playwright/mcp@latest --port 3333 --extension</div>
    <button id="btn-copy-cmd" class="btn-copy">Copy command</button>
  </div>

  <div class="footer">
    <button id="btn-stop" class="btn-stop hidden">Stop</button>
    <button id="btn-close" class="btn-close hidden">Close</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
