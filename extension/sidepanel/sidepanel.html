<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trial Guard — Cancel Trial</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="header">
    <span class="logo">🛡</span>
    <div class="header-text">
      <div class="title" id="sp-title">Trial Guard</div>
      <div class="subtitle" id="sp-subtitle">Automated Cancellation</div>
    </div>
    <div class="sp-timer hidden" id="sp-timer" role="timer" aria-label="Elapsed time">0:00</div>
  </div>

  <div id="sp-log" class="log" role="log" aria-live="polite"></div>

  <div id="sp-aion-setup" class="mcp-setup hidden">
    <p class="mcp-heading">Aion / Prompt API is not ready.</p>
    <p class="mcp-label">Open the extension popup and initialise the on-device model, then retry cancellation.</p>
  </div>

  <div class="footer">
    <button id="btn-stop" class="btn-stop hidden">Stop</button>
    <button id="btn-close" class="btn-close hidden">Close</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
